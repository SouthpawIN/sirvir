# Backend comparison notes:
# - llama.cpp: Best for TurboQuant, NextN, MTP, hybrid architectures. Atomic fork adds turbo KV cache.
# - vLLM: Best throughput for dense models at scale. Lacks turbo/NextN support. Test for non-MTP models.
# - Ollama: Easiest setup, good for quick testing. Generally slower than llama.cpp for same model.
# - SGlang: Best for serving multiple models concurrently. Test for MoE models.
# 
# Testing priority: llama.cpp (already done) → vLLM (test non-MTP 27B dense) → SGlang (test MoE) → Ollama (baseline)
